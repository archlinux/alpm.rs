name: Alpm

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Install Packages
        run: pacman -Syu rust clang gcc libarchive pkgconf diffutils --noconfirm --needed

      - name: Checkout
        uses: actions/checkout@v2

      - name: Format
        run: cargo fmt -- --check
        working-directory: alpm

      - name: Test
        run: cargo test --features generate,mtree
        working-directory: alpm

      - name: Check committed bindings are up to date
        run: |
          generated=$(find target -name ffi_generated.rs -path '*/alpm-sys-*/out/*' | head -1)
          if [ -z "$generated" ]; then echo "ffi_generated.rs not found"; exit 1; fi
          diff -u alpm-sys/src/ffi.rs "$generated"

  test-git:
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Install Packages
        run: pacman -Syu rust curl clang git base-devel libarchive meson asciidoc doxygen pkgconf fakechroot --noconfirm --needed

      - name: Install Pacman-git
        run: |
          git clone https://aur.archlinux.org/pacman-git
          chown -R nobody pacman-git
          cd pacman-git
          sudo -u nobody makepkg --nocheck
          sudo -u nobody makepkg --packagelist > list
          yes | pacman -U $(cat list)

      - name: Checkout
        uses: actions/checkout@v2

      - name: Format
        run: cargo fmt -- --check
        working-directory: alpm

      - name: Test
        run: cargo test --features generate,git,mtree
        working-directory: alpm

      - name: Check committed git bindings are up to date
        run: |
          generated=$(find target -name ffi_generated.rs -path '*/alpm-sys-*/out/*' | head -1)
          if [ -z "$generated" ]; then echo "ffi_generated.rs not found"; exit 1; fi
          diff -u alpm-sys/src/ffi_git.rs "$generated"
